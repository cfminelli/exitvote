<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExitVote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Logo ── */
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .logo span { color: #a78bfa; }

    .tagline {
      color: #6b7280;
      font-size: 0.95rem;
      margin-bottom: 40px;
      text-align: center;
    }

    /* ── Card ── */
    .card {
      background: #13131a;
      border: 1px solid #1f1f2e;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #e2e2ee;
    }

    /* ── Inputs ── */
    input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      color: #f0f0f5;
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    input:focus { border-color: #a78bfa; }
    input::placeholder { color: #4b5563; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #a78bfa; color: #0a0a0f; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    .btn-outline {
      background: transparent;
      border: 1px solid #2a2a3e;
      color: #a78bfa;
      margin-top: 8px;
    }
    .btn-outline:hover:not(:disabled) { border-color: #a78bfa; background: #1a1a2e; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #374151;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #1f1f2e;
    }

    /* ── Room code badge ── */
    .room-code {
      text-align: center;
      margin-bottom: 24px;
    }
    .room-code .label { font-size: 0.8rem; color: #6b7280; margin-bottom: 6px; }
    .room-code .code {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: #a78bfa;
    }
    .room-code .event { font-size: 0.9rem; color: #9ca3af; margin-top: 4px; }

    /* ── Vote buttons ── */
    .vote-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }
    .vote-btn {
      border: 2px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      padding: 20px 12px;
      text-align: center;
      transition: all 0.2s;
    }
    .vote-btn:active { transform: scale(0.96); }
    .vote-btn.stay {
      background: #0d2818;
      border-color: #166534;
      color: #4ade80;
    }
    .vote-btn.stay:hover { background: #14532d; }
    .vote-btn.stay.selected {
      background: #166534;
      border-color: #4ade80;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
    }
    .vote-btn.leave {
      background: #2d0d0d;
      border-color: #991b1b;
      color: #f87171;
    }
    .vote-btn.leave:hover { background: #7f1d1d; }
    .vote-btn.leave.selected {
      background: #991b1b;
      border-color: #f87171;
      box-shadow: 0 0 20px rgba(248, 113, 113, 0.2);
    }
    .vote-btn .emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }

    /* ── Results ── */
    .results {
      margin-top: 20px;
    }
    .verdict {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
      background: #1a1a2e;
    }
    .verdict.leave { background: #2d0d0d; color: #f87171; }
    .verdict.stay  { background: #0d2818; color: #4ade80; }
    .verdict.tie   { background: #1a1510; color: #fbbf24; }
    .verdict.none  { color: #6b7280; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .bar-label { width: 48px; text-align: right; color: #9ca3af; }
    .bar-track {
      flex: 1;
      background: #1f1f2e;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    .bar-fill.stay  { background: #4ade80; }
    .bar-fill.leave { background: #f87171; }
    .bar-count { width: 28px; color: #6b7280; font-size: 0.8rem; }

    .members-count {
      text-align: center;
      font-size: 0.8rem;
      color: #4b5563;
      margin-top: 12px;
    }

    /* ── Error ── */
    .error {
      background: #2d0d0d;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      color: #f87171;
      font-size: 0.875rem;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
    }

    /* ── Share row ── */
    .share-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .share-row input {
      margin: 0;
      font-size: 0.875rem;
      color: #a78bfa;
      cursor: pointer;
    }
    .share-row .btn {
      width: auto;
      padding: 0 16px;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* ── Back link ── */
    .back {
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 16px;
      text-align: center;
      width: 100%;
    }
    .back:hover { color: #a78bfa; }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>

  <div class="logo">Exit<span>Vote</span></div>
  <p class="tagline">Anonymous group voting — stay or leave?</p>

  <div class="card">

    <!-- ── Screen: Home ── -->
    <div class="screen active" id="screen-home">
      <h2>Create a room</h2>
      <input id="input-event" type="text" placeholder="Event name (e.g. Taylor Swift)" maxlength="100" />
      <button class="btn btn-primary" onclick="createRoom()">Create room</button>
      <div id="error-home" class="error"></div>

      <div class="divider">or join one</div>

      <input id="input-code" type="text" placeholder="Enter room code" maxlength="6"
        style="text-transform:uppercase;letter-spacing:4px;font-size:1.2rem;text-align:center" />
      <button class="btn btn-outline" onclick="joinRoom()">Join room</button>
      <div id="error-join" class="error"></div>
    </div>

    <!-- ── Screen: Vote ── -->
    <div class="screen" id="screen-vote">
      <div class="room-code">
        <div class="label">Room code</div>
        <div class="code" id="display-code"></div>
        <div class="event" id="display-event"></div>
      </div>

      <div class="share-row">
        <input id="share-url" type="text" readonly onclick="this.select()" />
        <button class="btn btn-outline" style="margin:0" onclick="copyShareUrl()">Copy</button>
      </div>

      <h2>Your vote</h2>
      <div class="vote-grid">
        <button class="vote-btn stay" id="btn-stay" onclick="castVote('stay')">
          <span class="emoji">🎵</span>Stay
        </button>
        <button class="vote-btn leave" id="btn-leave" onclick="castVote('leave')">
          <span class="emoji">🚪</span>Leave
        </button>
      </div>

      <div class="results">
        <div class="verdict none" id="verdict-text">No votes yet</div>
        <div class="bar-row">
          <div class="bar-label">Stay</div>
          <div class="bar-track"><div class="bar-fill stay" id="bar-stay" style="width:0%"></div></div>
          <div class="bar-count" id="count-stay">0</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Leave</div>
          <div class="bar-track"><div class="bar-fill leave" id="bar-leave" style="width:0%"></div></div>
          <div class="bar-count" id="count-leave">0</div>
        </div>
        <div class="members-count" id="members-count"></div>
      </div>

      <button class="back" onclick="goHome()">← Leave room</button>
    </div>

  </div>

  <script>
    const API = "";  // same origin — no need for full URL
    let state = { code: null, token: null, pollTimer: null };

    // ── Utilities ──────────────────────────────────────────────

    function show(screenId) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = "block";
    }

    function clearErrors() {
      document.querySelectorAll(".error").forEach(e => {
        e.style.display = "none";
        e.textContent = "";
      });
    }

    async function api(method, path, body) {
      const res = await fetch(API + path, {
        method,
        headers: { "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Something went wrong");
      return data;
    }

    // ── Actions ────────────────────────────────────────────────

    async function createRoom() {
      clearErrors();
      const name = document.getElementById("input-event").value.trim();
      if (!name) return showError("error-home", "Enter an event name first");
      try {
        const room = await api("POST", "/rooms", { event_name: name });
        const joined = await api("POST", `/rooms/${room.code}/join`);
        enterRoom(joined.code, joined.event_name, joined.member_token);
      } catch (e) {
        showError("error-home", e.message);
      }
    }

    async function joinRoom() {
      clearErrors();
      const code = document.getElementById("input-code").value.trim().toUpperCase();
      if (code.length !== 6) return showError("error-join", "Room codes are 6 letters");
      try {
        const joined = await api("POST", `/rooms/${code}/join`);
        enterRoom(joined.code, joined.event_name, joined.member_token);
      } catch (e) {
        showError("error-join", e.message);
      }
    }

    function enterRoom(code, eventName, token) {
      state.code = code;
      state.token = token;

      document.getElementById("display-code").textContent = code;
      document.getElementById("display-event").textContent = eventName;

      const shareUrl = `${location.origin}?join=${code}`;
      document.getElementById("share-url").value = shareUrl;

      show("screen-vote");
      fetchResults();
      state.pollTimer = setInterval(fetchResults, 3000);
    }

    async function castVote(choice) {
      try {
        await api("POST", `/rooms/${state.code}/vote`, {
          member_token: state.token,
          choice,
        });
        document.getElementById("btn-stay").classList.toggle("selected", choice === "stay");
        document.getElementById("btn-leave").classList.toggle("selected", choice === "leave");
        fetchResults();
      } catch (e) {
        console.error(e);
      }
    }

    async function fetchResults() {
      if (!state.code) return;
      try {
        const r = await api("GET", `/rooms/${state.code}/results`);
        const total = r.total_votes;
        const stayPct  = total ? (r.stay_count  / total) * 100 : 0;
        const leavePct = total ? (r.leave_count / total) * 100 : 0;

        document.getElementById("bar-stay").style.width  = stayPct  + "%";
        document.getElementById("bar-leave").style.width = leavePct + "%";
        document.getElementById("count-stay").textContent  = r.stay_count;
        document.getElementById("count-leave").textContent = r.leave_count;

        const v = document.getElementById("verdict-text");
        v.textContent = r.verdict;
        v.className = "verdict";
        if (r.verdict.includes("LEAVE")) v.classList.add("leave");
        else if (r.verdict.includes("STAY")) v.classList.add("stay");
        else if (r.verdict.includes("tie")) v.classList.add("tie");
        else v.classList.add("none");

        // fetch member count separately
        const room = await api("GET", `/rooms/${state.code}`);
        document.getElementById("members-count").textContent =
          `${room.member_count} ${room.member_count === 1 ? "person" : "people"} in room · ${total} ${total === 1 ? "vote" : "votes"}`;
      } catch (e) {
        console.error(e);
      }
    }

    function goHome() {
      clearInterval(state.pollTimer);
      state = { code: null, token: null, pollTimer: null };
      document.getElementById("input-event").value = "";
      document.getElementById("input-code").value = "";
      clearErrors();
      show("screen-home");
    }

    function copyShareUrl() {
      const url = document.getElementById("share-url").value;
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      });
    }

    // ── Auto-join from URL ──────────────────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get("join")) {
      document.getElementById("input-code").value = params.get("join");
      joinRoom();
    }
  </script>
</body>
</html>
